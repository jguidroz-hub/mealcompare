<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eddy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header .logo { font-size: 24px; }
    .header .tagline { font-size: 11px; color: #64748b; margin-left: auto; }
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: #94a3b8;
    }
    .empty h2 { font-size: 15px; margin-bottom: 8px; color: #cbd5e1; }
    .empty p { font-size: 13px; line-height: 1.5; }
    .empty .step {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      padding: 8px 0;
      font-size: 13px;
    }
    .empty .step-num {
      background: #3b82f6;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .loading {
      text-align: center;
      padding: 24px;
    }
    .loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .restaurant {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 12px;
    }
    .savings-banner {
      background: linear-gradient(135deg, #059669, #10b981);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
      text-align: center;
    }
    .savings-banner .amount {
      font-size: 28px;
      font-weight: 800;
      color: white;
    }
    .savings-banner .label {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      margin-top: 2px;
    }
    .quote {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .quote:hover { background: #334155; }
    .quote.best { border: 1px solid #10b981; }
    .quote .platform {
      font-size: 14px;
      font-weight: 600;
    }
    .quote .total {
      font-size: 16px;
      font-weight: 700;
    }
    .quote .best-tag {
      background: #10b981;
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .quote .unavailable {
      color: #64748b;
      font-size: 12px;
      font-style: italic;
    }
    .fee-details {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }
    .unavailable-quote { opacity: 0.5; cursor: default; }
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: #475569;
    }
    .footer a { color: #3b82f6; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .error-state {
      text-align: center;
      padding: 24px 16px;
      color: #f87171;
    }
    .error-state h2 { font-size: 15px; margin-bottom: 8px; }
    .error-state p { font-size: 13px; color: #94a3b8; line-height: 1.5; }
    .retry-btn {
      margin-top: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .retry-btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">💰</span>
    <h1>Eddy</h1>
    <span class="tagline">Stop overpaying</span>
  </div>
  <div id="content">
    <div class="empty">
      <h2>Save $5–15 on every order</h2>
      <p style="margin-bottom: 16px;">Eddy finds cheaper ways to order from the same restaurant.</p>
      <div class="step"><span class="step-num">1</span> Browse DoorDash, Uber Eats, or Grubhub</div>
      <div class="step"><span class="step-num">2</span> Add items to your cart</div>
      <div class="step"><span class="step-num">3</span> We compare prices instantly</div>
    </div>
  </div>
  <div class="footer">
    <a href="https://eddy.delivery" target="_blank">eddy.delivery</a> · Prices are estimates
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
