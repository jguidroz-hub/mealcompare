<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MealCompare Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .saved {
      background: #10b981;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .saved.show { display: inline-block; }
    p { font-size: 13px; color: #64748b; line-height: 1.6; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>🍔 MealCompare Settings</h1>
  <p>MealCompare compares food delivery prices across platforms in your area. Select your metro to get accurate results.</p>
  
  <label for="metro">Your Metro Area</label>
  <select id="metro">
    <option value="austin">Austin, TX</option>
    <option value="dc">Washington, DC</option>
  </select>

  <span id="saved" class="saved">✓ Saved</span>

  <script>
    const metroSelect = document.getElementById('metro');
    const saved = document.getElementById('saved');

    // Load current setting
    chrome.storage.sync.get('metro', (data) => {
      if (data.metro) metroSelect.value = data.metro;
    });

    // Save on change
    metroSelect.addEventListener('change', () => {
      chrome.storage.sync.set({ metro: metroSelect.value }, () => {
        saved.classList.add('show');
        setTimeout(() => saved.classList.remove('show'), 2000);
      });
    });
  </script>
</body>
</html>
